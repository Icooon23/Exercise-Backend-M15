
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Inspiration</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <h1>Daily Inspiration</h1>
        <p>Koleksi kata-kata mutiara</p>
    </header>

    <main>
        <div class="quotes-grid" id="quotes-grid">
            <!-- Loading state -->
            <div class="loading">Memuat quotes...</div>
        </div>
    </main>

    <script>
        async function loadQuotes() {
            const grid = document.getElementById('quotes-grid');
            try {
                const response = await fetch('/api/quotes');
                const quotes = await response.json();
                
                grid.innerHTML = ''; // Hapus loading text

                if (quotes.length === 0) {
                    grid.innerHTML = '<p class="no-data">Belum ada quotes di database.</p>';
                    return;
                }

                quotes.forEach(quote => {
                    const card = document.createElement('div');
                    card.className = 'quote-card';
                    card.innerHTML = `
                        <div class="quote-icon">"</div>
                        <p class="quote-text">${quote.text}</p>
                        <div class="quote-author">— ${quote.author}</div>
                    `;
                    grid.appendChild(card);
                });
            } catch (error) {
                grid.innerHTML = '<p class="error">Gagal memuat quotes. Periksa koneksi database.</p>';
                console.error(error);
            }
        }

        // Jalankan saat halaman dimuat
        loadQuotes();
    </script>
</body>
</html>
